site_name: Ticket Booking API — Documentation
site_description: Документація REST API сервісу для бронювання квитків
site_author: Student Lab 8
docs_dir: docs

theme:
  name: material
  language: uk
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - search.highlight

nav:
  - Home: README.md
  - Архітектура:
      - System Specification (SSD): architecture/SSD.md
      - System Design (SDD): architecture/SDD.md
      - Infrastructure (ISD): architecture/ISD.md
  - Якість:
      - Test Strategy: quality/test-strategy.md
      - Traceability Matrix: quality/traceability-matrix.md
  - Розробникам:
      - Onboarding: developer/onboarding.md
  - API:
      - OpenAPI (Swagger UI): api/swagger-ui.html
  - Процеси:
      - CI/CD Pipeline: ci-cd-docs.md
      - Definition of Done: definition-of-done.md
      - UI Components (Storybook): storybook.md
  - Опис:
      - Опис: Description.md

markdown_extensions:
  - tables
  - fenced_code
  - toc:
      permalink: true
